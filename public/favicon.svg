<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ecf8e"/>
      <stop offset="50%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00c5ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="192" height="192" fill="#0f0f0f" rx="30"/>

  <circle cx="96" cy="96" r="75" fill="url(#bgGlow)"/>

  <path
    d="M96 12 L173 54 L173 138 L96 180 L19 138 L19 54 Z"
    fill="none"
    stroke="#3ecf8e"
    stroke-width="1.5"
    stroke-opacity="0.15"
  />

  <path
    d="M96 26 L162 62 L162 130 L96 166 L30 130 L30 62 Z"
    fill="none"
    stroke="url(#brandGrad)"
    stroke-width="2"
    stroke-opacity="0.3"
    filter="url(#softGlow)"
  />

  <path
    d="M96 42 L151 72 L151 120 L96 150 L41 120 L41 72 Z"
    fill="#171717"
    stroke="url(#brandGrad)"
    stroke-width="3"
    filter="url(#glow)"
  />

  <path
    d="M96 50 L146 76 L146 116 L96 142 L46 116 L46 76 Z"
    fill="none"
    stroke="#3ecf8e"
    stroke-width="1"
    stroke-opacity="0.25"
  />

  <g filter="url(#glow)">
    <rect x="56" y="67" width="80" height="58" rx="10" fill="url(#brandGrad)"/>
    <polygon points="64,125 64,138 82,125" fill="url(#brandGrad)"/>
    <rect x="67" y="79" width="45" height="5" rx="2.5" fill="#0f0f0f" opacity="0.4"/>
    <rect x="67" y="89" width="58" height="5" rx="2.5" fill="#0f0f0f" opacity="0.4"/>
    <rect x="67" y="99" width="34" height="5" rx="2.5" fill="#0f0f0f" opacity="0.4"/>
    <circle cx="136" cy="60" r="8" fill="#ff4757"/>
    <circle cx="136" cy="60" r="5" fill="white"/>
  </g>

  <circle cx="157" cy="41" r="3" fill="#3ecf8e" filter="url(#glow)" opacity="0.9"/>
  <circle cx="157" cy="41" r="6" fill="none" stroke="#3ecf8e" stroke-width="1" opacity="0.3"/>

  <circle cx="35" cy="151" r="3" fill="#00d4aa" filter="url(#glow)" opacity="0.9"/>
  <circle cx="35" cy="151" r="6" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>

  <circle cx="96" cy="18" r="2.5" fill="#00c5ff" filter="url(#glow)" opacity="0.8"/>

  <polygon
    points="147,33 154,42 151,42 158,53 146,38 149,38"
    fill="#00c5ff"
    filter="url(#glow)"
    opacity="0.85"
  />
</svg>
